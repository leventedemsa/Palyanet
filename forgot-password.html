<!doctype html>
<html lang="hu" data-bs-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pályanet - Jelszó visszaállítás</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />

    <style>
      [data-bs-theme="dark"] body.bg-body-secondary {
        background-color: #0f1216 !important;
      }
      [data-bs-theme="dark"] .bg-light-subtle {
        background-color: #141922 !important;
      }
      [data-bs-theme="dark"] .bg-body-tertiary {
        background-color: #151a22 !important;
      }
      [data-bs-theme="dark"] .border {
        border-color: rgba(255, 255, 255, 0.12) !important;
      }
      [data-bs-theme="dark"] .navbar-toggler {
        border-color: rgba(255, 255, 255, 0.25);
      }
    </style>
  </head>

  <body class="bg-body-secondary d-flex flex-column min-vh-100">
    <header>
      <nav class="navbar navbar-expand-lg bg-light-subtle sticky-top shadow-sm">
        <div class="container">
          <a class="navbar-brand fw-bold" href="/Palyanet/index.html">
            <img src="/Palyanet/palyanetlogo.png" alt="Logó" width="30" height="24" class="me-2" />
            Pályanet
          </a>

          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
          </button>

          <div class="collapse navbar-collapse" id="navbarNav">
            <div class="navbar-nav ms-auto align-items-lg-center gap-2">
              <a class="nav-link" href="/Palyanet/contact.html">Kapcsolat</a>
              <a class="nav-link" href="/Palyanet/login.html">Bejelentkezés</a>

              <div class="nav-item ms-lg-2">
                <button id="themeToggle" class="btn btn-outline-secondary btn-sm" type="button" aria-label="Téma váltása">🌙 Dark</button>
              </div>
            </div>
          </div>
        </div>
      </nav>
    </header>

    <main class="container py-5 flex-fill">
      <div class="row justify-content-center">
        <div class="col-md-8 col-lg-5">
          <section class="rounded-4 p-4 p-md-5 bg-body-tertiary border shadow-sm">
            <h1 class="h4 fw-bold mb-3 text-center">Jelszó visszaállítás</h1>

            <p class="text-center text-body-secondary mb-4">Add meg az email címedet, és küldünk neked egy jelszó-visszaállító linket.</p>

            <form class="needs-validation" novalidate>
              <div class="mb-4">
                <label for="email" class="form-label">Email cím</label>
                <input
                  type="email"
                  class="form-control"
                  id="email"
                  name="email"
                  placeholder="example@gmail.com"
                  autocomplete="email"
                  required
                />
                <div class="invalid-feedback">Kérlek adj meg egy érvényes email címet.</div>
              </div>

              <button type="submit" class="btn btn-primary w-100">Visszaállító link küldése</button>
            </form>

            <div class="text-center mt-3 small">
              <a href="/Palyanet/login.html" class="link-opacity-75">← Vissza a bejelentkezéshez</a>
            </div>
          </section>
        </div>
      </div>
    </main>

    <footer class="bg-light-subtle text-center py-4 mt-5">
      <div class="container">© 2026 Pályanet - Minden jog fenntartva</div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      const htmlEl = document.documentElement;
      const btn = document.getElementById("themeToggle");

      function setTheme(theme) {
        htmlEl.setAttribute("data-bs-theme", theme);
        localStorage.setItem("theme", theme);

        if (theme === "dark") {
          btn.textContent = "☀️ Light";
          btn.classList.remove("btn-outline-secondary");
          btn.classList.add("btn-outline-light");
        } else {
          btn.textContent = "🌙 Dark";
          btn.classList.remove("btn-outline-light");
          btn.classList.add("btn-outline-secondary");
        }
      }

      const saved = localStorage.getItem("theme");
      const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
      setTheme(saved ?? (prefersDark ? "dark" : "light"));

      btn.addEventListener("click", () => {
        const current = htmlEl.getAttribute("data-bs-theme") || "light";
        setTheme(current === "dark" ? "light" : "dark");
      });
    </script>

    <!-- Bootstrap form validáció -->
    <script>
      (() => {
        "use strict";
        const forms = document.querySelectorAll(".needs-validation");
        Array.from(forms).forEach((form) => {
          form.addEventListener(
            "submit",
            (event) => {
              if (!form.checkValidity()) {
                event.preventDefault();
                event.stopPropagation();
              }
              form.classList.add("was-validated");
            },
            false,
          );
        });
      })();
    </script>
  </body>
</html>
