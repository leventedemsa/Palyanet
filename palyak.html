<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <title>Pályák</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <h1>Pályák</h1>

  <!-- SZŰRŐK -->
  <div class="filters">
    <select>
      <option>Sportág</option>
      <option>Foci</option>
      <option>Tenisz</option>
      <option>Kosár</option>
    </select>

    <input type="text" placeholder="Helyszín" />

    <input type="number" placeholder="Max ár" />

    <input type="date" />

    <button>Keresés</button>
  </div>

  <hr />

  <!-- KÁRTYÁK -->
  <div class="cards">

    <div class="card">
      <img src="palyanetlogo.png" alt="pálya" width="200" />

      <h3>Városi Focipálya</h3>
      <span class="badge">Foci</span>

      <p>📍 Budapest</p>
      <p>💰 8000 Ft / óra</p>
      <p>👤 Tulaj: Kovács Béla</p>

      <button>Részletek</button>
    </div>

    <div class="card">
      <img src="palyanetlogo.png" alt="pálya" width="200" />

      <h3>Tenisz Center</h3>
      <span class="badge">Tenisz</span>

      <p>📍 Győr</p>
      <p>💰 6000 Ft / óra</p>
      <p>👤 Tulaj: Nagy Anna</p>

      <button>Részletek</button>
    </div>

  </div>

</body>
</html>
