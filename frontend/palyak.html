<!doctype html>
<html lang="hu" data-bs-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pályanet - Pályák</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />

    <style>

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

:root{
  --accent:#ff7a18;
  --accent-soft:#ff9b3d;
  --accent-darker:#e66a0a;
}

* {
  font-family: 'Inter', sans-serif;
}

@keyframes slideDown {
  from { opacity:0; transform:translateY(-10px); }
  to { opacity:1; transform:translateY(0); }
}

@keyframes fadeIn {
  from { opacity:0; }
  to { opacity:1; }
}

@keyframes glow {
  0%, 100% { box-shadow:0 0 10px rgba(255,122,24,0.3); }
  50% { box-shadow:0 0 20px rgba(255,122,24,0.6); }
}

@keyframes underlineSlide {
  from { width:0; }
  to { width:100%; }
}

body {
  animation: fadeIn 0.6s ease-out;
}

.navbar {
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(255,122,24,0.1) !important;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.navbar-brand {
  transition: all 0.3s ease;
  font-size: 1.2rem;
  letter-spacing: 0.5px;
}

.navbar-brand:hover {
  color: var(--accent) !important;
  transform: translateY(-2px);
}

.nav-link {
  position: relative;
  font-weight: 500;
  color: inherit !important;
  transition: all 0.3s ease;
  margin: 0 0.5rem;
}

.nav-link::after {
  content: '';
  position: absolute;
  bottom: -8px;
  left: 0;
  width: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent-soft));
  transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

.nav-link:hover::after {
  width: 100%;
}

.nav-link:hover {
  color: var(--accent) !important;
}

#themeToggle {
  background: linear-gradient(135deg, rgba(255,122,24,0.1) 0%, rgba(255,122,24,0.05) 100%);
  border: 1px solid rgba(255,122,24,0.3) !important;
  color: inherit !important;
  font-weight: 600;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: hidden;
}

#themeToggle::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  width: 0;
  height: 0;
  background: radial-gradient(circle, rgba(255,122,24,0.3), transparent);
  transform: translate(-50%, -50%);
  transition: width 0.5s, height 0.5s;
}

#themeToggle:hover {
  background: linear-gradient(135deg, rgba(255,122,24,0.2) 0%, rgba(255,122,24,0.1) 100%);
  border-color: var(--accent) !important;
  transform: translateY(-3px);
  box-shadow: 0 8px 25px rgba(255,122,24,0.25);
}

#themeToggle:hover::before {
  width: 150%;
  height: 150%;
}

#themeToggle:active {
  transform: translateY(-1px);
}

[data-bs-theme="dark"] #themeToggle {
  background: linear-gradient(135deg, rgba(255,122,24,0.15) 0%, rgba(255,122,24,0.05) 100%);
  border-color: rgba(255,122,24,0.4) !important;
}

footer {
  border-top: 1px solid rgba(255,122,24,0.1);
  transition: all 0.3s ease;
}

[data-bs-theme="dark"] footer {
  border-top-color: rgba(255,122,24,0.2);
  background: rgba(15, 18, 24, 0.5) !important;
  backdrop-filter: blur(10px);
}

[data-bs-theme="light"] footer {
  background: rgba(255,255,255,0.5) !important;
  backdrop-filter: blur(10px);
}

[data-bs-theme="dark"] body{
  background:#0b0d12;
  color:#e8e8e8;
}

[data-bs-theme="dark"] body.bg-body-secondary {
  background-color: #0b0d12 !important;
}

[data-bs-theme="dark"] .bg-light-subtle {
  background-color: #141922 !important;
}

[data-bs-theme="dark"] .bg-body-tertiary {
  background-color: #151a22 !important;
}

[data-bs-theme="dark"] .border {
  border-color: rgba(255, 255, 255, 0.12) !important;
}

[data-bs-theme="dark"] .navbar-toggler {
  border-color: rgba(255, 255, 255, 0.25);
}

[data-bs-theme="dark"] .navbar{
  background:#0f1218 !important;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3) !important;
}

[data-bs-theme="light"] body{
  background:#f4f6fa;
}

[data-bs-theme="light"] body.bg-body-secondary {
  background-color: #f4f6fa !important;
}

[data-bs-theme="light"] .navbar{
  background:white !important;
  border-bottom:1px solid rgba(255, 122, 24, 0.15) !important;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08) !important;
}

.palya-card {
  height: 100%;
  border-radius: 1.5rem;
  overflow: hidden;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
}

.palya-card:hover {
  transform: translateY(-8px);
  box-shadow: 0 15px 40px rgba(255,122,24,0.3) !important;
}

[data-bs-theme="dark"] .palya-card {
  background: radial-gradient(circle at 20% 20%, rgba(255,122,24,.15), transparent 40%), #11151d;
  border: 1px solid rgba(255,255,255,.06);
}

[data-bs-theme="light"] .palya-card {
  background: radial-gradient(circle at 20% 20%, rgba(255,122,24,.1), transparent 40%), white;
  border: 1px solid #e6e6e6;
}

.palya-card img {
  height: 200px;
  object-fit: cover;
}

.palya-info {
  padding: 1.25rem;
}

.palya-badge {
  display: inline-block;
  margin: 0.5rem 0;
}

.palya-meta {
  font-size: 0.95rem;
  margin: 0.5rem 0;
  color: #6c757d;
}

[data-bs-theme="dark"] .palya-meta {
  color: #adb5bd;
}

.palya-owner {
  margin-top: 1rem;
  font-weight: 500;
  border-top: 1px solid #dee2e6;
  padding-top: 1rem;
}

[data-bs-theme="dark"] .palya-owner {
  border-color: rgba(255, 255, 255, 0.12);
}

.btn-accent {
  background:linear-gradient(135deg, var(--accent) 0%, var(--accent-soft) 100%);
  border:none;
  color:white;
  font-weight:600;
  padding:.8rem 2rem;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: hidden;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-size: 0.9rem;
  box-shadow: 0 4px 15px rgba(255,122,24,0.3);
}

.btn-accent::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: rgba(255,255,255,0.2);
  transition: left 0.4s ease;
  z-index: 0;
}

.btn-accent:hover::before {
  left: 100%;
}

.btn-accent:hover{
  background:linear-gradient(135deg, var(--accent-soft) 0%, var(--accent) 100%);
  transform:translateY(-4px);
  box-shadow:0 15px 40px rgba(255,122,24,.5), 0 0 20px rgba(255,122,24,.3);
}

[data-bs-theme="dark"] .modal-content {
  background: #11151d;
  border: 1px solid rgba(255,255,255,.06);
}

[data-bs-theme="dark"] .modal-header,
[data-bs-theme="dark"] .modal-footer {
  border-color: rgba(255,255,255,.06);
}

[data-bs-theme="dark"] .form-control,
[data-bs-theme="dark"] .form-select {
  background: #0b0d12;
  border-color: rgba(255,122,24,0.3);
  color: #e8e8e8;
}

[data-bs-theme="dark"] .form-select option {
  background: #1a1f2e;
  color: #e8e8e8;
}

[data-bs-theme="dark"] .form-control:focus,
[data-bs-theme="dark"] .form-select:focus {
  border-color: var(--accent);
  background: #0b0d12;
  box-shadow: 0 0 0 0.2rem rgba(255,122,24,.35);
}

::-webkit-scrollbar {
  width: 10px;
}

::-webkit-scrollbar-track {
  background: rgba(255,122,24,0.05);
}

::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, var(--accent), var(--accent-soft));
  border-radius: 10px;
  transition: background 0.3s ease;
}

::-webkit-scrollbar-thumb:hover {
  background: linear-gradient(180deg, var(--accent-soft), var(--accent));
}

    </style>
  </head>

  <body class="d-flex flex-column min-vh-100" style="background:linear-gradient(135deg, rgba(255,122,24,0.08) 0%, transparent 50%);">
    <header>
      <nav class="navbar navbar-expand-lg bg-light-subtle sticky-top shadow-sm">
        <div class="container">
          <a class="navbar-brand fw-bold" href="./index.html">
            <img src="./palyanetlogo.png" alt="Logó" width="30" height="24" class="me-2" />
            Pályanet
          </a>

          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
          </button>

          <div class="collapse navbar-collapse" id="navbarNav">
            <div class="navbar-nav ms-auto align-items-lg-center gap-2">
              <a class="nav-link active" href="./palyak.html">Pályák</a>
              <a class="nav-link" href="./contact.html">Kapcsolat</a>
              <a class="nav-link" href="./login.html">Bejelentkezés</a>

              <div class="nav-item ms-lg-2">
                <button id="themeToggle" class="btn btn-outline-secondary btn-sm" type="button" aria-label="Téma váltása">🌙 Dark</button>
              </div>
            </div>
          </div>
        </div>
      </nav>
    </header>

    <main class="container py-5 flex-fill">
      <!-- SZŰRŐ SZAKASZ -->
      <section class="mb-5">
        <h1 class="h3 fw-bold mb-4">Pályák keresése</h1>

        <div class="rounded-4 p-4 bg-body-tertiary border shadow-sm">
          <form class="row g-3">
            <div class="col-md-3">
              <label for="sportag" class="form-label">Sportág</label>
              <select class="form-select" id="sportag">
                <option selected value="">Összes</option>
                <option value="Foci">Foci</option>
                <option value="Tenisz">Tenisz</option>
                <option value="Kosárlabda">Kosárlabda</option>
                <option value="Badminton">Badminton</option>
                <option value="Squash">Squash</option>
              </select>
            </div>

            <div class="col-md-3">
              <label for="helyszin" class="form-label">Helyszín</label>
              <input type="text" class="form-control" id="helyszin" placeholder="pl. Budapest" />
            </div>

            <div class="col-md-2">
              <label for="maxar" class="form-label">Max ár/óra</label>
              <input type="number" class="form-control" id="maxar" placeholder="Ft" min="0" />
            </div>

            <div class="col-md-2">
              <label for="datum" class="form-label">Dátum</label>
              <input type="date" class="form-control" id="datum" />
            </div>

            <div class="col-md-2">
              <label for="placeholder" class="form-label">&nbsp;</label>
              <button type="button" class="btn btn-accent w-100" id="keresesBtn">Keresés</button>
            </div>

            <div class="col-md-2">
              <label for="placeholder2" class="form-label">&nbsp;</label>
              <button type="button" class="btn btn-accent w-100" id="ujPaylaBtn" data-bs-toggle="modal" data-bs-target="#ujPalyaModal">➕ Új pálya</button>
            </div>
          </form>
        </div>
      </section>

      <!-- KÁRTYÁK SZAKASZ -->
      <section>
        <div class="row g-4" id="palyakContainer">
          <!-- Dinamikus pályák ide kerülnek -->
        </div>
      </section>

    </main>

    <!-- ===== ÚJ PÁLYA MODAL ===== -->
    <div class="modal fade" id="ujPalyaModal" tabindex="-1">
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Új pálya hozzáadása</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <form id="ujPalyaForm">
              <div class="mb-3">
                <label for="modalNev" class="form-label">Pálya neve *</label>
                <input type="text" class="form-control" id="modalNev" required />
              </div>

              <div class="row">
                <div class="col-md-6 mb-3">
                  <label for="modalSportag" class="form-label">Sportág *</label>
                  <select class="form-select" id="modalSportag" required>
                    <option selected value="">Válassz sportágat</option>
                    <option value="Foci">Foci</option>
                    <option value="Tenisz">Tenisz</option>
                    <option value="Kosárlabda">Kosárlabda</option>
                    <option value="Badminton">Badminton</option>
                    <option value="Squash">Squash</option>
                  </select>
                </div>
                <div class="col-md-6 mb-3">
                  <label for="modalHelyszin" class="form-label">Helyszín *</label>
                  <input type="text" class="form-control" id="modalHelyszin" placeholder="pl. Budapest" required />
                </div>
              </div>

              <div class="row">
                <div class="col-md-6 mb-3">
                  <label for="modalAr" class="form-label">Ár/óra (Ft) *</label>
                  <input type="number" class="form-control" id="modalAr" min="0" required />
                </div>
                <div class="col-md-6 mb-3">
                  <label for="modalKepUrl" class="form-label">Kép URL</label>
                  <input type="url" class="form-control" id="modalKepUrl" />
                </div>
              </div>

              <div class="mb-3">
                <label for="modalLeiras" class="form-label">Leírás</label>
                <textarea class="form-control" id="modalLeiras" rows="3"></textarea>
              </div>

              <div class="row">
                <div class="col-md-6 mb-3">
                  <label for="modalNyitas" class="form-label">Nyitás</label>
                  <input type="time" class="form-control" id="modalNyitas" value="08:00" />
                </div>
                <div class="col-md-6 mb-3">
                  <label for="modalZaras" class="form-label">Zárás</label>
                  <input type="time" class="form-control" id="modalZaras" value="20:00" />
                </div>
              </div>

              <div class="alert alert-info">
                <small>* Kötelező mezők</small>
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Bezárás</button>
            <button type="button" class="btn btn-accent" id="ujPalyaKuldBtn">Hozzáadás</button>
          </div>
        </div>
      </div>
    </div>

    <footer class="bg-light-subtle text-center py-4 mt-5">
      <div class="container">© 2026 Pályanet - Minden jog fenntartva</div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./auth-nav.js"></script>

    <script>
      const htmlEl = document.documentElement;
      const btn = document.getElementById("themeToggle");

      function setTheme(theme) {
        htmlEl.setAttribute("data-bs-theme", theme);
        localStorage.setItem("theme", theme);

        if (theme === "dark") {
          btn.textContent = "☀️ Light";
          btn.classList.remove("btn-outline-secondary");
          btn.classList.add("btn-outline-light");
        } else {
          btn.textContent = "🌙 Dark";
          btn.classList.remove("btn-outline-light");
          btn.classList.add("btn-outline-secondary");
        }
      }

      const saved = localStorage.getItem("theme");
      const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
      setTheme(saved ?? (prefersDark ? "dark" : "light"));

      btn.addEventListener("click", () => {
        const current = htmlEl.getAttribute("data-bs-theme") || "light";
        setTheme(current === "dark" ? "light" : "dark");
      });

      // ===== PÁLYÁK KEZELÉS =====
      const API_URL = "http://localhost:4000/api/palyak";
      const container = document.getElementById("palyakContainer");

      // Pályák megjelenítése
      function renderPalyak(palyak) {
        container.innerHTML = "";
        
        if (palyak.length === 0) {
          container.innerHTML = '<div class="col-12"><p class="text-center text-body-secondary">Nincsenek találatok</p></div>';
          return;
        }

        palyak.forEach(palya => {
          const card = document.createElement("div");
          card.className = "col-md-6 col-lg-4";
          card.innerHTML = `
            <div class="card palya-card bg-body-tertiary border shadow-sm">
              <img src="${palya.kep_url || './palyanetlogo.png'}" class="card-img-top" alt="${palya.nev}" style="height:200px; object-fit:cover;" />
              <div class="palya-info">
                <h5 class="card-title fw-bold">${palya.nev}</h5>
                <div class="palya-badge">
                  <span class="badge bg-primary">${palya.sportag}</span>
                </div>
                <p class="palya-meta">📍 ${palya.helyszin}</p>
                <p class="palya-meta">💰 ${palya.ar_ora} Ft / óra</p>
                <div class="palya-owner">
                  <p class="mb-2 small text-muted">👤 Tulajdonos</p>
                  <p class="mb-0 fw-semibold">${palya.teljes_nev || palya.username}</p>
                </div>
                <button class="btn btn-accent w-100 mt-3" onclick="alert('Foglalás hamarosan elérhető')">📅 Foglalás</button>
              </div>
            </div>
          `;
          container.appendChild(card);
        });
      }

      // Pályák betöltése az API-ról
      async function loadPalyak(filters = {}) {
        try {
          const params = new URLSearchParams();
          if (filters.sportag) params.append("sportag", filters.sportag);
          if (filters.helyszin) params.append("helyszin", filters.helyszin);
          if (filters.maxar) params.append("maxar", filters.maxar);

          const response = await fetch(`${API_URL}?${params}`);
          const palyak = await response.json();
          renderPalyak(palyak);
        } catch (error) {
          console.error("Pályák betöltési hiba:", error);
          container.innerHTML = '<div class="col-12"><p class="text-center text-danger">Betöltési hiba</p></div>';
        }
      }

      // Szűrő gomb
      document.getElementById("keresesBtn").addEventListener("click", () => {
        const filters = {
          sportag: document.getElementById("sportag").value,
          helyszin: document.getElementById("helyszin").value,
          maxar: document.getElementById("maxar").value
        };
        loadPalyak(filters);
      });

      // Új pálya hozzáadása
      document.getElementById("ujPalyaKuldBtn").addEventListener("click", async () => {
        const user = JSON.parse(localStorage.getItem("user") || sessionStorage.getItem("user"));
        
        if (!user) {
          alert("Bejelentkezés szükséges!");
          window.location.href = "./login.html";
          return;
        }

        console.log("User objektum:", user);

        const formData = {
          tulaj_id: user.felhasznalo_id || 1,
          nev: document.getElementById("modalNev").value,
          sportag: document.getElementById("modalSportag").value,
          helyszin: document.getElementById("modalHelyszin").value,
          ar_ora: parseInt(document.getElementById("modalAr").value),
          leiras: document.getElementById("modalLeiras").value,
          kep_url: document.getElementById("modalKepUrl").value,
          nyitas: document.getElementById("modalNyitas").value,
          zaras: document.getElementById("modalZaras").value
        };

        console.log("Küldött adatok:", formData);

        try {
          const response = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(formData)
          });

          const responseData = await response.json();
          console.log("API válasz:", responseData);

          if (response.ok) {
            alert("Pálya sikeresen hozzáadva!");
            document.getElementById("ujPalyaForm").reset();
            bootstrap.Modal.getInstance(document.getElementById("ujPalyaModal")).hide();
            loadPalyak();
          } else {
            alert("Hiba a pálya hozzáadásakor: " + (responseData.error || responseData.message || "Ismeretlen hiba"));
          }
        } catch (error) {
          console.error("Hiba:", error);
          alert("Szövegalkalmazás hiba: " + error.message);
        }
      });

      // Kezdeti betöltés
      loadPalyak();
    </script>
  </body>
</html>
