<!doctype html>
<html lang="hu" data-bs-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pályanet - Profil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />

    <style>

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

:root{
  --accent:#ff7a18;
  --accent-soft:#ff9b3d;
  --accent-darker:#e66a0a;
}

* {
  font-family: 'Inter', sans-serif;
}

@keyframes slideDown {
  from { opacity:0; transform:translateY(-10px); }
  to { opacity:1; transform:translateY(0); }
}

@keyframes fadeIn {
  from { opacity:0; }
  to { opacity:1; }
}

@keyframes glow {
  0%, 100% { box-shadow:0 0 10px rgba(255,122,24,0.3); }
  50% { box-shadow:0 0 20px rgba(255,122,24,0.6); }
}

@keyframes underlineSlide {
  from { width:0; }
  to { width:100%; }
}

body {
  animation: fadeIn 0.6s ease-out;
}

.navbar {
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(255,122,24,0.1) !important;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.navbar-brand {
  transition: all 0.3s ease;
  font-size: 1.2rem;
  letter-spacing: 0.5px;
}

.navbar-brand:hover {
  color: var(--accent) !important;
  transform: translateY(-2px);
}

.nav-link {
  position: relative;
  font-weight: 500;
  color: inherit !important;
  transition: all 0.3s ease;
  margin: 0 0.5rem;
}

.nav-link::after {
  content: '';
  position: absolute;
  bottom: -8px;
  left: 0;
  width: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent-soft));
  transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

.nav-link:hover::after {
  width: 100%;
}

.nav-link:hover {
  color: var(--accent) !important;
}

#themeToggle {
  background: linear-gradient(135deg, rgba(255,122,24,0.1) 0%, rgba(255,122,24,0.05) 100%);
  border: 1px solid rgba(255,122,24,0.3) !important;
  color: inherit !important;
  font-weight: 600;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: hidden;
}

#themeToggle::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  width: 0;
  height: 0;
  background: radial-gradient(circle, rgba(255,122,24,0.3), transparent);
  transform: translate(-50%, -50%);
  transition: width 0.5s, height 0.5s;
}

#themeToggle:hover {
  background: linear-gradient(135deg, rgba(255,122,24,0.2) 0%, rgba(255,122,24,0.1) 100%);
  border-color: var(--accent) !important;
  transform: translateY(-3px);
  box-shadow: 0 8px 25px rgba(255,122,24,0.25);
}

#themeToggle:hover::before {
  width: 150%;
  height: 150%;
}

#themeToggle:active {
  transform: translateY(-1px);
}

[data-bs-theme="dark"] #themeToggle {
  background: linear-gradient(135deg, rgba(255,122,24,0.15) 0%, rgba(255,122,24,0.05) 100%);
  border-color: rgba(255,122,24,0.4) !important;
}

.hero {
  border-radius:1.5rem;
  transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: hidden;
}

.hero::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: radial-gradient(circle at 30% 30%, rgba(255,122,24,0.1), transparent);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.6s ease;
}

.hero:hover::before {
  opacity: 1;
}

[data-bs-theme="dark"] body{
  background:#0b0d12;
  color:#e8e8e8;
}

[data-bs-theme="dark"] .hero{
  background:
  radial-gradient(circle at 20% 20%, rgba(255,122,24,.25), transparent 40%),
  radial-gradient(circle at 80% 60%, rgba(255,122,24,.15), transparent 40%),
  #11151d;

  border:1px solid rgba(255,255,255,.06);
  box-shadow:0 20px 60px rgba(0,0,0,.6);
}

[data-bs-theme="dark"] .navbar{
  background:#0f1218 !important;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3) !important;
}

[data-bs-theme="light"] body{
  background:#f4f6fa;
}

[data-bs-theme="light"] .hero{
  background:
  radial-gradient(circle at 20% 20%, rgba(255,122,24,.15), transparent 40%),
  white;

  border:1px solid #e6e6e6;
  box-shadow:0 15px 40px rgba(0,0,0,.08);
}

[data-bs-theme="light"] .navbar{
  background:white !important;
  border-bottom:1px solid rgba(255, 122, 24, 0.15) !important;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08) !important;
}

.form-control{
  border-radius: 0.8rem;
  border: 1px solid rgba(255,122,24,0.2);
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  background: rgba(255,122,24,0.02);
}

.form-control:focus{
  border-color: var(--accent);
  box-shadow: 0 0 0 0.2rem rgba(255,122,24,.25), inset 0 1px 1px rgba(0,0,0,.075);
  background: rgba(255,255,255,0.5);
}

[data-bs-theme="dark"] .form-control {
  background: rgba(255,122,24,0.05);
  border-color: rgba(255,122,24,0.3);
  color: #e8e8e8;
}

[data-bs-theme="dark"] .form-control:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 0.2rem rgba(255,122,24,.35);
  background: rgba(255,122,24,0.1);
}

.btn-accent{
  background:linear-gradient(135deg, var(--accent) 0%, var(--accent-soft) 100%);
  border:none;
  color:white;
  font-weight:600;
  padding:.8rem 2rem;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: hidden;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-size: 0.9rem;
  box-shadow: 0 4px 15px rgba(255,122,24,0.3);
}

.btn-accent::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: rgba(255,255,255,0.2);
  transition: left 0.4s ease;
  z-index: 0;
}

.btn-accent:hover::before {
  left: 100%;
}

.btn-accent:hover{
  background:linear-gradient(135deg, var(--accent-soft) 0%, var(--accent) 100%);
  transform:translateY(-4px);
  box-shadow:0 15px 40px rgba(255,122,24,.5), 0 0 20px rgba(255,122,24,.3);
}

.btn-accent:active{
  transform:translateY(-1px);
  box-shadow:0 8px 20px rgba(255,122,24,.4);
}

.btn-danger-accent {
  background:linear-gradient(135deg, #dc3545 0%, #c82333 100%);
  border:none;
  color:white;
  font-weight:600;
  padding:.8rem 2rem;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: hidden;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-size: 0.9rem;
  box-shadow: 0 4px 15px rgba(220, 53, 69, 0.3);
}

.btn-danger-accent::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: rgba(255,255,255,0.2);
  transition: left 0.4s ease;
  z-index: 0;
}

.btn-danger-accent:hover::before {
  left: 100%;
}

.btn-danger-accent:hover{
  background:linear-gradient(135deg, #c82333 0%, #bd2130 100%);
  transform:translateY(-4px);
  box-shadow:0 15px 40px rgba(220, 53, 69, .5), 0 0 20px rgba(220, 53, 69, .3);
}

[data-bs-theme="dark"] .btn-accent{
  box-shadow:0 0 25px rgba(255,122,24,.4);
}

[data-bs-theme="dark"] .btn-accent:hover{
  box-shadow:0 15px 45px rgba(255,122,24,.6), 0 0 30px rgba(255,122,24,.5);
}

.profile-card {
  border-radius: 1.5rem;
  transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: hidden;
}

[data-bs-theme="dark"] .profile-card {
  background: radial-gradient(circle at 20% 20%, rgba(255,122,24,.15), transparent 40%), #11151d;
  border: 1px solid rgba(255,255,255,.06);
}

[data-bs-theme="light"] .profile-card {
  background: radial-gradient(circle at 20% 20%, rgba(255,122,24,.1), transparent 40%), white;
  border: 1px solid #e6e6e6;
}

.profile-header {
  text-align: center;
  padding: 2rem 1rem;
  border-bottom: 1px solid rgba(255,122,24,0.1);
}

.profile-avatar {
  width: 120px;
  height: 120px;
  margin: 0 auto 1rem;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent-soft) 100%);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 3rem;
  color: white;
  box-shadow: 0 4px 15px rgba(255,122,24,0.3);
  overflow: hidden;
  position: relative;
  border: 4px solid white;
}

.profile-avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.profile-avatar-upload {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0, 0, 0, 0.6);
  opacity: 0;
  transition: opacity 0.3s ease;
  cursor: pointer;
  border-radius: 50%;
}

.profile-avatar:hover .profile-avatar-upload {
  opacity: 1;
}

.profile-avatar-upload-icon {
  color: white;
  font-size: 1.5rem;
}

#profilePictureInput {
  display: none;
}

.profile-info {
  padding: 2rem;
}

.info-field {
  margin-bottom: 1.5rem;
}

.info-label {
  font-weight: 600;
  color: var(--accent);
  font-size: 0.9rem;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 0.5rem;
}

.info-value {
  font-size: 1rem;
  color: inherit;
  word-break: break-word;
}

[data-bs-theme="dark"] .info-value {
  color: #e8e8e8;
}

.button-group {
  display: flex;
  gap: 1rem;
  margin-top: 2rem;
}

.button-group button {
  flex: 1;
}

footer {
  border-top: 1px solid rgba(255,122,24,0.1);
  transition: all 0.3s ease;
}

[data-bs-theme="dark"] footer {
  border-top-color: rgba(255,122,24,0.2);
  background: rgba(15, 18, 24, 0.5) !important;
  backdrop-filter: blur(10px);
}

[data-bs-theme="light"] footer {
  background: rgba(255,255,255,0.5) !important;
  backdrop-filter: blur(10px);
}

::-webkit-scrollbar {
  width: 10px;
}

::-webkit-scrollbar-track {
  background: rgba(255,122,24,0.05);
}

::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, var(--accent), var(--accent-soft));
  border-radius: 10px;
  transition: background 0.3s ease;
}

::-webkit-scrollbar-thumb:hover {
  background: linear-gradient(180deg, var(--accent-soft), var(--accent));
}

    </style>
  </head>

  <body class="d-flex flex-column min-vh-100" style="background:linear-gradient(135deg, rgba(255,122,24,0.08) 0%, transparent 50%);">
    <header>
      <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
          <a class="navbar-brand fw-bold" href="./index.html">
            <img src="./palyanetlogo.png" alt="Logó" width="30" height="24" class="me-2" />
            Pályanet
          </a>

          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
          </button>

          <div class="collapse navbar-collapse" id="navbarNav">
            <div class="navbar-nav ms-auto align-items-lg-center gap-2">
              <a class="nav-link" href="./palyak.html">Pályák</a>
              <a class="nav-link" href="./contact.html">Kapcsolat</a>
              <a class="nav-link active" href="./user_profile.html">👤 Profil</a>

              <div class="nav-item ms-lg-2">
                <button id="themeToggle" class="btn btn-outline-secondary btn-sm" type="button" aria-label="Téma váltása">🌙 Dark</button>
              </div>
            </div>
          </div>
        </div>
      </nav>
    </header>

    <main class="container py-5 flex-fill">
      <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
          <div class="profile-card p-0 shadow-lg">
            <div class="profile-header">
              <div class="profile-avatar" id="profileAvatarContainer" style="cursor: pointer;">
                <img id="profilePictureImg" style="display: none;" alt="Profilkép" />
                <span id="profileAvatarEmoji">👤</span>
                <div class="profile-avatar-upload">
                  <span class="profile-avatar-upload-icon">📷</span>
                </div>
              </div>
              <input type="file" id="profilePictureInput" accept="image/*" />
              <h1 class="h4 fw-bold mb-1" id="profileName">Profil</h1>
              <p class="text-body-secondary mb-0" id="profileEmail">Betöltés...</p>
            </div>

            <div class="profile-info">
              <div class="info-field">
                <div class="info-label">Felhasználónév</div>
                <div class="info-value" id="infoUsername">Nem elérhető</div>
              </div>

              <div class="info-field">
                <div class="info-label">Email cím</div>
                <div class="info-value" id="infoEmail">Nem elérhető</div>
              </div>

              <div class="info-field">
                <div class="info-label">Szerep</div>
                <div class="info-value" id="infoRole">Nem elérhető</div>
              </div>

              <div class="button-group">
                <button class="btn btn-accent" id="uploadPictureBtn">
                  📷 Profilkép módosítása
                </button>
                <button class="btn btn-danger-accent" id="deletePictureBtn" style="display: none;">
                  🗑️ Profilkép törlése
                </button>
              </div>

              <div class="button-group mt-3">
                <button class="btn btn-danger-accent" onclick="logout()">
                  🚪 Kijelentkezés
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="text-center py-4 mt-5">
      <div class="container">© 2026 Pályanet - Minden jog fenntartva</div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./auth-nav.js"></script>

    <script>
      // Theme toggle
      const htmlEl = document.documentElement;
      const btn = document.getElementById("themeToggle");

      function setTheme(theme) {
        htmlEl.setAttribute("data-bs-theme", theme);
        localStorage.setItem("theme", theme);

        if (theme === "dark") {
          btn.textContent = "☀️ Light";
          btn.classList.remove("btn-outline-secondary");
          btn.classList.add("btn-outline-light");
        } else {
          btn.textContent = "🌙 Dark";
          btn.classList.remove("btn-outline-light");
          btn.classList.add("btn-outline-secondary");
        }
      }

      const saved = localStorage.getItem("theme");
      const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
      setTheme(saved ?? (prefersDark ? "dark" : "light"));

      btn.addEventListener("click", () => {
        const current = htmlEl.getAttribute("data-bs-theme");
        setTheme(current === "dark" ? "light" : "dark");
      });

      // Load user profile
      function loadProfile() {
        try {
          const user = JSON.parse(localStorage.getItem("user") || sessionStorage.getItem("user"));
          
          if (user) {
            document.getElementById("profileName").textContent = user.username || "Profil";
            document.getElementById("profileEmail").textContent = user.email || "Email nem elérhető";
            
            document.getElementById("infoUsername").textContent = user.username || "Nem elérhető";
            document.getElementById("infoEmail").textContent = user.email || "Nem elérhető";
            
            // Role mapping
            const roleMap = {
              "berlo": "Bérlő",
              "palyatulajdonos": "Pályatulajdonos"
            };
            document.getElementById("infoRole").textContent = roleMap[user.szerep] || user.szerep || "Nem elérhető";
            
            // Display profile picture
            displayProfilePicture(user);
            
            // Show/hide delete button
            const deleteBtn = document.getElementById("deletePictureBtn");
            if (user.profil_kep_url) {
              deleteBtn.style.display = "inline-block";
            } else {
              deleteBtn.style.display = "none";
            }
          }
        } catch (error) {
          console.log("Profil adatok nem érhetők el");
        }
      }

      function displayProfilePicture(user) {
        const img = document.getElementById("profilePictureImg");
        const emoji = document.getElementById("profileAvatarEmoji");
        
        if (user.profil_kep_url) {
          // Handle both relative and absolute URLs
          let imageUrl = user.profil_kep_url;
          if (!imageUrl.startsWith("http")) {
            imageUrl = `http://localhost:4000${imageUrl}`;
          }
          img.src = imageUrl;
          img.style.display = "block";
          emoji.style.display = "none";
        } else {
          img.style.display = "none";
          emoji.style.display = "block";
        }
      }

      // Handle profile picture upload
      document.getElementById("uploadPictureBtn").addEventListener("click", () => {
        document.getElementById("profilePictureInput").click();
      });

      document.getElementById("profileAvatarContainer").addEventListener("click", () => {
        document.getElementById("profilePictureInput").click();
      });

      document.getElementById("profilePictureInput").addEventListener("change", async (event) => {
        const file = event.target.files[0];
        if (!file) return;

        // Validate file type
        if (!file.type.startsWith("image/")) {
          alert("Csak képfájlokat lehet feltölteni!");
          return;
        }

        // Validate file size (5MB max)
        if (file.size > 5 * 1024 * 1024) {
          alert("A fájl túl nagy! Maximum 5MB lehet.");
          return;
        }

        try {
          const user = JSON.parse(localStorage.getItem("user") || sessionStorage.getItem("user"));
          if (!user) {
            alert("Bejelentkezés szükséges!");
            window.location.href = "./login.html";
            return;
          }

          const formData = new FormData();
          formData.append("profilePicture", file);
          formData.append("userId", user.felhasznalo_id);

          // Determine which endpoint to use
          const endpoint = user.profil_kep_url ? "/api/profile/update" : "/api/profile/upload";
          
          const response = await fetch(`http://localhost:4000${endpoint}`, {
            method: user.profil_kep_url ? "PUT" : "POST",
            body: formData,
          });

          const responseData = await response.json();

          if (response.ok) {
            // Update local storage
            user.profil_kep_url = responseData.profil_kep_url;
            localStorage.setItem("user", JSON.stringify(user));
            sessionStorage.setItem("user", JSON.stringify(user));
            
            // Update display
            displayProfilePicture(user);
            document.getElementById("deletePictureBtn").style.display = "inline-block";
            
            alert("Profilkép sikeresen frissítve!");
            
            // Reset input
            document.getElementById("profilePictureInput").value = "";
          } else {
            alert("Hiba a profilkép feltöltésekor: " + (responseData.message || "Ismeretlen hiba"));
          }
        } catch (error) {
          console.error("Hiba:", error);
          alert("Szövegalkalmazás hiba: " + error.message);
        }
      });

      // Handle profile picture deletion
      document.getElementById("deletePictureBtn").addEventListener("click", async () => {
        if (!confirm("Biztosan szeretnéd törölni a profilképet?")) {
          return;
        }

        try {
          const user = JSON.parse(localStorage.getItem("user") || sessionStorage.getItem("user"));
          if (!user) {
            alert("Bejelentkezés szükséges!");
            window.location.href = "./login.html";
            return;
          }

          const response = await fetch("http://localhost:4000/api/profile/delete", {
            method: "DELETE",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              userId: user.felhasznalo_id,
            }),
          });

          const responseData = await response.json();

          if (response.ok) {
            // Update local storage
            user.profil_kep_url = null;
            localStorage.setItem("user", JSON.stringify(user));
            sessionStorage.setItem("user", JSON.stringify(user));
            
            // Update display
            displayProfilePicture(user);
            document.getElementById("deletePictureBtn").style.display = "none";
            
            alert("Profilkép sikeresen törölve!");
          } else {
            alert("Hiba a profilkép törlésekor: " + (responseData.message || "Ismeretlen hiba"));
          }
        } catch (error) {
          console.error("Hiba:", error);
          alert("Szövegalkalmazás hiba: " + error.message);
        }
      });

      // Logout
      function logout() {
        if (confirm("Biztosan ki szeretnél jelentkezni?")) {
          localStorage.removeItem("token");
          localStorage.removeItem("user");
          sessionStorage.removeItem("token");
          sessionStorage.removeItem("user");
          window.location.replace("./login.html");
        }
      }

      loadProfile();
    </script>
  </body>
</html>
