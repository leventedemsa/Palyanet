<!doctype html>
<html lang="hu" data-bs-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Palyanet - Bérléseim</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/line-awesome@1.3.0/dist/line-awesome/css/line-awesome.min.css">
  <style>
    :root { --sidebar-width: 300px; --topbar-height: 70px; --violet: #5b4bdb; --bg: #f5f7fb; --border: #e9ecef; --text: #444; }
    * { box-sizing: border-box; }
    body { background: var(--bg); overflow-x: hidden; margin: 0; }
    .topbar { height: var(--topbar-height); background: #fff; border-bottom: 1px solid var(--border); position: fixed; top: 0; left: 0; right: 0; z-index: 1040; display: flex; align-items: center; padding: 0 16px; }
    .menu-toggle { border: none; background: transparent; font-size: 28px; color: #333; padding: 0; line-height: 1; }
    .menu-toggle:hover { color: var(--violet); }
    .sidebar-desktop { position: fixed; top: var(--topbar-height); left: 0; width: var(--sidebar-width); height: calc(100vh - var(--topbar-height)); background: #fff; border-right: 1px solid var(--border); z-index: 1030; display: flex; flex-direction: column; }
    .sidebar-brand { border-bottom: 1px solid var(--border); padding: 18px 24px; flex-shrink: 0; }
    .sidebar-brand a { color: #222; text-decoration: none; font-weight: 700; font-size: 1.6rem; transition: 0.2s; }
    .sidebar-brand a:hover { color: var(--violet); }
    .sidebar-section-title { font-size: 0.78rem; letter-spacing: 1px; padding: 14px 20px; border-bottom: 1px solid #eee; color: var(--violet); text-transform: uppercase; font-weight: bold; flex-shrink: 0; }
    .sidebar-links { list-style: none; margin: 0; padding: 0; flex: 1 1 auto; overflow-y: auto; }
    .sidebar-links li { border-bottom: 1px solid #f1f1f1; }
    .sidebar-link { display: flex; align-items: center; gap: 12px; padding: 14px 20px; color: var(--text); text-decoration: none; transition: 0.2s; font-size: 0.98rem; }
    .sidebar-link:hover, .sidebar-link.is-active { background: #f3f0ff; color: var(--violet); }
    .sidebar-link .icon { font-size: 1.2rem; width: 24px; text-align: center; flex-shrink: 0; }
    .sidebar-user-wrap { margin-top: auto; border-top: 1px solid #eee; padding: 16px; background: #fff; }
    .sidebar-user { display: flex; align-items: center; gap: 10px; }
    .sidebar-user-avatar { width: 40px; height: 40px; object-fit: cover; }
    .offcanvas { width: 300px !important; }
    .offcanvas-header { padding: 18px 20px; }
    .offcanvas-title { color: #222; text-decoration: none; font-weight: 700; font-size: 1.4rem; }
    .offcanvas-title:hover { color: var(--violet); }
    .offcanvas-body { padding: 0; display: flex; flex-direction: column; height: 100%; }
    .main-content { margin-top: var(--topbar-height); margin-left: var(--sidebar-width); padding: 24px; min-height: 100vh; }
    @media (max-width: 991.98px) { .sidebar-desktop { display: none; } .main-content { margin-left: 0; padding: 18px; } }
    @media (min-width: 992px) { .menu-toggle, .topbar { display: none; } .sidebar-desktop { top: 0; height: 100vh; } .main-content { margin-top: 0; } }
  </style>
</head>
<body>
  <div class="topbar">
    <button class="menu-toggle me-3 d-lg-none" type="button" data-bs-toggle="offcanvas" data-bs-target="#mobileSidebar" aria-controls="mobileSidebar" aria-label="Menü megnyitása"><i class="las la-bars"></i></button>
  </div>

  <aside class="sidebar-desktop profile-sidebar">
    <div class="sidebar-brand"><a href="../index.html">Palyanet</a></div>
    <ul class="sidebar-links">
      <li data-sidebar-item="profil"><a href="./profil.html" class="sidebar-link"><span class="icon"><i class="lar la-user-circle"></i></span>Profilom</a></li>
      <li data-sidebar-item="palyaim"><a href="./palyaim.html" class="sidebar-link"><span class="icon"><i class="las la-pager"></i></span>Pályáim</a></li>
      <li data-sidebar-item="foglalasaim"><a href="./foglalasaim.html" class="sidebar-link"><span class="icon"><i class="las la-university"></i></span>Foglalásaim</a></li>
      <li data-sidebar-item="berleseim"><a href="./berleseim.html" class="sidebar-link is-active"><span class="icon"><i class="las la-calendar-check"></i></span>Bérléseim</a></li>
      <li data-sidebar-item="ertesitesek"><a href="./ertesitesek.html" class="sidebar-link"><span class="icon"><i class="lar la-paper-plane"></i></span>Értesítések</a></li>
    </ul>
    <div class="sidebar-user-wrap">
      <div class="sidebar-user mb-2"><img class="sidebar-user-avatar rounded-circle" src="https://github.com/mdo.png" alt="Profilkép"><div class="sidebar-user-name fw-semibold">Felhasználó</div></div>
      <a href="#" class="btn btn-outline-secondary btn-sm w-100 sidebar-logout-btn">Kijelentkezés</a>
    </div>
  </aside>

  <div class="offcanvas offcanvas-start bg-white border-0 profile-sidebar" tabindex="-1" id="mobileSidebar" aria-labelledby="mobileSidebarLabel">
    <div class="offcanvas-header border-bottom"><a href="../index.html" class="offcanvas-title" id="mobileSidebarLabel">Palyanet</a><button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Bezárás"></button></div>
    <div class="offcanvas-body">
      <ul class="sidebar-links">
        <li data-sidebar-item="profil"><a href="./profil.html" class="sidebar-link"><span class="icon"><i class="lar la-user-circle"></i></span>Profilom</a></li>
        <li data-sidebar-item="palyaim"><a href="./palyaim.html" class="sidebar-link"><span class="icon"><i class="las la-pager"></i></span>Pályáim</a></li>
        <li data-sidebar-item="foglalasaim"><a href="./foglalasaim.html" class="sidebar-link"><span class="icon"><i class="las la-university"></i></span>Foglalásaim</a></li>
        <li data-sidebar-item="berleseim"><a href="./berleseim.html" class="sidebar-link is-active"><span class="icon"><i class="las la-calendar-check"></i></span>Bérléseim</a></li>
      <li data-sidebar-item="ertesitesek"><a href="./ertesitesek.html" class="sidebar-link"><span class="icon"><i class="lar la-paper-plane"></i></span>Értesítések</a></li>
      </ul>
      <div class="sidebar-user-wrap">
        <div class="sidebar-user mb-2"><img class="sidebar-user-avatar rounded-circle" src="https://github.com/mdo.png" alt="Profilkép"><div class="sidebar-user-name fw-semibold">Felhasználó</div></div>
        <a href="#" class="btn btn-outline-secondary btn-sm w-100 sidebar-logout-btn">Kijelentkezés</a>
      </div>
    </div>
  </div>

  <main class="main-content">
    <div class="p-4 p-md-5">
      <h1 class="h3 mb-2">Bérléseim</h1>
      <p class="text-muted mb-4">Aktív és korábbi bérléseid.</p>

      <div class="card shadow-sm mb-4">
        <div class="card-body">
          <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
            <h2 class="h5 mb-0">Aktuális foglalások</h2>
            <div class="d-flex align-items-center gap-2">
              <span class="badge text-bg-primary" id="currentRentalsCount">0</span>
              <button class="btn btn-outline-secondary btn-sm" type="button" data-bs-toggle="collapse" data-bs-target="#currentRentalsCollapse" aria-expanded="true" aria-controls="currentRentalsCollapse">Mutat/Elrejt</button>
            </div>
          </div>
          <div id="currentRentalsCollapse" class="collapse show"><div id="currentRentalsContainer" class="row g-3"></div></div>
        </div>
      </div>

      <div class="card shadow-sm">
        <div class="card-body">
          <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
            <h2 class="h5 mb-0">Korábbi foglalások</h2>
            <div class="d-flex align-items-center gap-2">
              <span class="badge text-bg-secondary" id="pastRentalsCount">0</span>
              <button class="btn btn-outline-secondary btn-sm" type="button" data-bs-toggle="collapse" data-bs-target="#pastRentalsCollapse" aria-expanded="true" aria-controls="pastRentalsCollapse">Mutat/Elrejt</button>
            </div>
          </div>
          <div id="pastRentalsCollapse" class="collapse show"><div id="pastRentalsContainer" class="row g-3"></div></div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    (function(){
      const saved = localStorage.getItem('theme');
      if(saved) document.documentElement.setAttribute('data-bs-theme', saved);
      else if(window.matchMedia('(prefers-color-scheme: dark)').matches)
        document.documentElement.setAttribute('data-bs-theme','dark');
    })();
  </script>
  <script src="berleseim.js"></script>
</body>
</html>
