<!doctype html>
<html lang="hu" data-bs-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Palyanet - Bérléseim</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-body-tertiary">
  <main class="container-fluid">
    <div class="row min-vh-100">
    <aside class="col-12 col-lg-3 col-xl-2 d-flex flex-column flex-shrink-0 p-3 text-white bg-dark profile-sidebar">
      <a href="../index.html" class="d-flex align-items-center mb-3 text-white text-decoration-none">
        <span class="fs-4">Palyanet</span>
      </a>
      <hr>

      <ul class="nav nav-pills flex-column mb-auto">
        <li class="nav-item">
          <a href="./profil.html" class="nav-link text-white">Profilom</a>
        </li>
        <li>
          <a href="./palyaim.html" class="nav-link text-white">Pályáim</a>
        </li>
        <li>
          <a href="./foglalasaim.html" class="nav-link text-white">Foglalásaim</a>
        </li>
        <li>
          <a href="#" class="nav-link active" aria-current="page">Bérléseim</a>
        </li>
      </ul>

      <hr>
      <div class="dropdown">
        <a href="#" class="d-flex align-items-center text-white text-decoration-none dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false">
          <img id="sidebarUserAvatar" src="https://github.com/mdo.png" alt="Profilkép" width="32" height="32" class="rounded-circle me-2">
          <strong id="sidebarUserName">Felhasználó</strong>
        </a>
        <ul class="dropdown-menu dropdown-menu-dark small shadow">
          <li><a id="sidebarLogoutBtn" class="dropdown-item" href="#">Kijelentkezés</a></li>
        </ul>
      </div>
    </aside>

    <section class="col-12 col-lg-9 col-xl-10">
      <div class="p-4 p-md-5">
        <h1 class="h3 mb-2">Bérléseim</h1>
        <p class="text-muted mb-4">Aktív és korábbi bérléseid.</p>

        <div class="card shadow-sm mb-4">
          <div class="card-body">
            <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
              <h2 class="h5 mb-0">Aktuális foglalások</h2>
              <div class="d-flex align-items-center gap-2">
                <span class="badge text-bg-primary" id="currentRentalsCount">0</span>
                <button
                  class="btn btn-outline-secondary btn-sm"
                  type="button"
                  data-bs-toggle="collapse"
                  data-bs-target="#currentRentalsCollapse"
                  aria-expanded="true"
                  aria-controls="currentRentalsCollapse"
                >
                  Mutat/Elrejt
                </button>
              </div>
            </div>
            <div id="currentRentalsCollapse" class="collapse show">
              <div id="currentRentalsContainer" class="row g-3"></div>
            </div>
          </div>
        </div>

        <div class="card shadow-sm">
          <div class="card-body">
            <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
              <h2 class="h5 mb-0">Korábbi foglalások</h2>
              <div class="d-flex align-items-center gap-2">
                <span class="badge text-bg-secondary" id="pastRentalsCount">0</span>
                <button
                  class="btn btn-outline-secondary btn-sm"
                  type="button"
                  data-bs-toggle="collapse"
                  data-bs-target="#pastRentalsCollapse"
                  aria-expanded="true"
                  aria-controls="pastRentalsCollapse"
                >
                  Mutat/Elrejt
                </button>
              </div>
            </div>
            <div id="pastRentalsCollapse" class="collapse show">
              <div id="pastRentalsContainer" class="row g-3"></div>
            </div>
          </div>
        </div>
      </div>
    </section>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Dark/Light theme toggle - sync with main site
    (function(){
      const saved = localStorage.getItem('theme');
      if(saved) document.documentElement.setAttribute('data-bs-theme', saved);
      else if(window.matchMedia('(prefers-color-scheme: dark)').matches)
        document.documentElement.setAttribute('data-bs-theme','dark');
    })();
  </script>
  <script src="berleseim.js"></script>
</body>
</html>
