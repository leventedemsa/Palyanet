<!doctype html>
<html lang="hu" data-bs-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pályanet - Kapcsolat</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />

<style>

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

:root{
  --accent:#ff7a18;
  --accent-soft:#ff9b3d;
  --accent-darker:#e66a0a;
}

* {
  font-family: 'Inter', sans-serif;
}

@keyframes slideDown {
  from { opacity:0; transform:translateY(-10px); }
  to { opacity:1; transform:translateY(0); }
}

@keyframes fadeIn {
  from { opacity:0; }
  to { opacity:1; }
}

@keyframes underlineSlide {
  from { width:0; }
  to { width:100%; }
}

body {
  animation: fadeIn 0.6s ease-out;
}

.navbar {
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(255,122,24,0.1) !important;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 4px 20px rgba(0,0,0,0.08) !important;
}

.navbar-brand {
  transition: all 0.3s ease;
  font-size: 1.2rem;
  letter-spacing: 0.5px;
}

.navbar-brand:hover {
  color: var(--accent) !important;
  transform: translateY(-2px);
}

.nav-link {
  position: relative;
  font-weight: 500;
  color: inherit !important;
  transition: all 0.3s ease;
  margin: 0 0.5rem;
}

.nav-link::after {
  content: '';
  position: absolute;
  bottom: -8px;
  left: 0;
  width: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent-soft));
  transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

.nav-link:hover::after {
  width: 100%;
}

.nav-link:hover {
  color: var(--accent) !important;
}

#themeToggle {
  background: linear-gradient(135deg, rgba(255,122,24,0.1) 0%, rgba(255,122,24,0.05) 100%);
  border: 1px solid rgba(255,122,24,0.3) !important;
  color: inherit !important;
  font-weight: 600;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: hidden;
}

#themeToggle::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  width: 0;
  height: 0;
  background: radial-gradient(circle, rgba(255,122,24,0.3), transparent);
  transform: translate(-50%, -50%);
  transition: width 0.5s, height 0.5s;
}

#themeToggle:hover {
  background: linear-gradient(135deg, rgba(255,122,24,0.2) 0%, rgba(255,122,24,0.1) 100%);
  border-color: var(--accent) !important;
  transform: translateY(-3px);
  box-shadow: 0 8px 25px rgba(255,122,24,0.25);
}

#themeToggle:hover::before {
  width: 150%;
  height: 150%;
}

#themeToggle:active {
  transform: translateY(-1px);
}

.page-card{
  border-radius:1.5rem;
  transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: hidden;
}

.page-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: radial-gradient(circle at 30% 30%, rgba(255,122,24,0.1), transparent);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.6s ease;
}

.page-card:hover::before {
  opacity: 1;
}

[data-bs-theme="dark"] body{
  background:#0b0d12;
  color:#e8e8e8;
}

[data-bs-theme="dark"] .page-card{
  background:
  radial-gradient(circle at 20% 20%, rgba(255,122,24,.20), transparent 40%),
  #11151d;

  border:1px solid rgba(255,255,255,.06);
  box-shadow:0 20px 60px rgba(0,0,0,.6);
}

[data-bs-theme="dark"] .navbar{
  background:#0f1218 !important;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3) !important;
}

[data-bs-theme="light"] body{
  background:#f4f6fa;
}

[data-bs-theme="light"] .page-card{
  background:
  radial-gradient(circle at 20% 20%, rgba(255,122,24,.12), transparent 40%),
  white;

  border:1px solid #e6e6e6;
  box-shadow:0 15px 40px rgba(0,0,0,.08);
}

[data-bs-theme="light"] .navbar{
  background:white !important;
  border-bottom:1px solid rgba(255, 122, 24, 0.15) !important;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08) !important;
}

.form-control{
  border-radius: 0.8rem;
  border: 1px solid rgba(255,122,24,0.2);
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  background: rgba(255,122,24,0.02);
}

.form-control:focus{
  border-color: var(--accent);
  box-shadow: 0 0 0 0.2rem rgba(255,122,24,.25), inset 0 1px 1px rgba(0,0,0,.075);
  background: rgba(255,255,255,0.5);
}

[data-bs-theme="dark"] .form-control {
  background: rgba(255,122,24,0.05);
  border-color: rgba(255,122,24,0.3);
  color: #e8e8e8;
}

[data-bs-theme="dark"] .form-control:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 0.2rem rgba(255,122,24,.35);
  background: rgba(255,122,24,0.1);
}

.btn-accent{
  background:linear-gradient(135deg, var(--accent) 0%, var(--accent-soft) 100%);
  border:none;
  color:white;
  font-weight:600;
  padding:.8rem 2rem;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: hidden;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-size: 0.9rem;
  box-shadow: 0 4px 15px rgba(255,122,24,0.3);
}

.btn-accent::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: rgba(255,255,255,0.2);
  transition: left 0.4s ease;
  z-index: 0;
}

.btn-accent:hover::before {
  left: 100%;
}

.btn-accent:hover{
  background:linear-gradient(135deg, var(--accent-soft) 0%, var(--accent) 100%);
  transform:translateY(-4px);
  box-shadow:0 15px 40px rgba(255,122,24,.5), 0 0 20px rgba(255,122,24,.3);
}

.btn-accent:active{
  transform:translateY(-1px);
  box-shadow:0 8px 20px rgba(255,122,24,.4);
}

[data-bs-theme="dark"] .btn-accent{
  box-shadow:0 0 25px rgba(255,122,24,.4);
}

[data-bs-theme="dark"] .btn-accent:hover{
  box-shadow:0 15px 45px rgba(255,122,24,.6), 0 0 30px rgba(255,122,24,.5);
}

footer {
  border-top: 1px solid rgba(255,122,24,0.1);
  transition: all 0.3s ease;
}

[data-bs-theme="dark"] footer {
  border-top-color: rgba(255,122,24,0.2);
  background: rgba(15, 18, 24, 0.5) !important;
  backdrop-filter: blur(10px);
}

[data-bs-theme="light"] footer {
  background: rgba(255,255,255,0.5) !important;
  backdrop-filter: blur(10px);
}

::-webkit-scrollbar {
  width: 10px;
}

::-webkit-scrollbar-track {
  background: rgba(255,122,24,0.05);
}

::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, var(--accent), var(--accent-soft));
  border-radius: 10px;
  transition: background 0.3s ease;
}

::-webkit-scrollbar-thumb:hover {
  background: linear-gradient(180deg, var(--accent-soft), var(--accent));
}

</style>

  </head>

  <body class="d-flex flex-column min-vh-100" style="background:linear-gradient(135deg, rgba(255,122,24,0.08) 0%, transparent 50%);">

    <header>
      <nav class="navbar navbar-expand-lg bg-light-subtle sticky-top shadow-sm">
        <div class="container">
          <a class="navbar-brand fw-bold" href="./index.html">
            <img src="../palyanetlogo.png" alt="Logó" width="30" height="24" class="me-2" />
            Pályanet
          </a>

          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
          </button>

          <div class="collapse navbar-collapse" id="navbarNav">
            <div class="navbar-nav ms-auto align-items-lg-center gap-2">
              <a class="nav-link active" href="./contact.html">Kapcsolat</a>
              <a class="nav-link" href="./login.html">Bejelentkezés</a>

              <div class="nav-item ms-lg-2">
                <button id="themeToggle" class="btn btn-outline-secondary btn-sm" type="button">🌙 Dark</button>
              </div>
            </div>
          </div>
        </div>
      </nav>
    </header>

    <main class="container py-5 flex-fill">

      <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">

          <section class="page-card p-4 p-md-5">

            <h1 class="h4 fw-bold mb-4 text-center">Kapcsolat</h1>

            <p class="text-center text-body-secondary mb-4">
              Kérdésed van a Pályanettel kapcsolatban? Írj nekünk üzenetet!
            </p>

            <form class="needs-validation" novalidate>

              <div class="mb-3">
                <label for="name" class="form-label">Neved</label>
                <input type="text" class="form-control" id="name" required />
                <div class="invalid-feedback">Kérlek add meg a neved.</div>
              </div>

              <div class="mb-3">
                <label for="email" class="form-label">Email cím</label>
                <input type="email" class="form-control" id="email" required />
                <div class="invalid-feedback">Kérlek adj meg egy érvényes email címet.</div>
              </div>

              <div class="mb-3">
                <label for="message" class="form-label">Üzenet</label>
                <textarea class="form-control" id="message" rows="4" required></textarea>
                <div class="invalid-feedback">Kérlek írd meg az üzeneted.</div>
              </div>

              <button type="submit" class="btn btn-accent w-100">
                Üzenet küldése
              </button>

            </form>

          </section>

        </div>
      </div>

    </main>

    <footer class="bg-light-subtle text-center py-4 mt-5">
      <div class="container">© 2026 Pályanet - Minden jog fenntartva</div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../auth-nav.js"></script>

<script>

const htmlEl = document.documentElement;
const btn = document.getElementById("themeToggle");

function setTheme(theme){
  htmlEl.setAttribute("data-bs-theme",theme);
  localStorage.setItem("theme",theme);

  if(theme==="dark"){
    btn.textContent="☀️ Light";
    btn.classList.remove("btn-outline-secondary");
    btn.classList.add("btn-outline-light");
  }else{
    btn.textContent="🌙 Dark";
    btn.classList.remove("btn-outline-light");
    btn.classList.add("btn-outline-secondary");
  }
}

const saved = localStorage.getItem("theme");
const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;

setTheme(saved ?? (prefersDark ? "dark":"light"));

btn.addEventListener("click",()=>{
  const current = htmlEl.getAttribute("data-bs-theme");
  setTheme(current==="dark"?"light":"dark");
});

</script>

<!-- Bootstrap validáció -->

<script>
(() => {
"use strict";
const forms = document.querySelectorAll(".needs-validation");
Array.from(forms).forEach((form) => {
form.addEventListener(
"submit",
(event) => {
if (!form.checkValidity()) {
event.preventDefault();
event.stopPropagation();
}
form.classList.add("was-validated");
},
false
);
});
})();
</script>

  </body>
</html>
