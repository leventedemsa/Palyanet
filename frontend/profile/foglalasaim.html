<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Palyanet - Foglalasaim</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="profile.css" rel="stylesheet">
</head>
<body>
  <main class="profile-layout">
    <aside class="d-flex flex-column flex-shrink-0 p-3 text-white bg-dark profile-sidebar">
      <a href="../index.html" class="d-flex align-items-center mb-3 text-white text-decoration-none">
        <span class="fs-4">Palyanet</span>
      </a>
      <hr>

      <ul class="nav nav-pills flex-column mb-auto">
        <li class="nav-item">
          <a href="./profile.html" class="nav-link text-white">Profilom</a>
        </li>
        <li>
          <a href="./palyaim.html" class="nav-link text-white">Palyaim</a>
        </li>
        <li>
          <a href="#" class="nav-link active" aria-current="page">Foglalasaim</a>
        </li>
        <li>
          <a href="./berleseim.html" class="nav-link text-white">Berleseim</a>
        </li>
      </ul>

      <hr>
      <div class="dropdown">
        <a href="#" class="d-flex align-items-center text-white text-decoration-none dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false">
          <img src="https://github.com/mdo.png" alt="Profilkep" width="32" height="32" class="rounded-circle me-2">
          <strong>Teszt Elek</strong>
        </a>
        <ul class="dropdown-menu dropdown-menu-dark text-small shadow">
          <li><a class="dropdown-item" href="#">Kijelentkezes</a></li>
        </ul>
      </div>
    </aside>

    <section class="profile-content">
      <div class="container-fluid p-4 p-md-5">
        <h1 class="h3 mb-2">Foglalasaim</h1>
        <p class="text-muted mb-4">Placeholder adatok, backend nelkul.</p>

        <div class="card shadow-sm mb-4">
          <div class="card-body">
            <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
              <h2 class="h5 mb-0">Foglaltsagi naptar</h2>
              <div class="d-flex align-items-center gap-2">
                <button class="btn btn-outline-secondary btn-sm" id="calendarPrevMonth" type="button">&lt;</button>
                <strong id="calendarMonthLabel"></strong>
                <button class="btn btn-outline-secondary btn-sm" id="calendarNextMonth" type="button">&gt;</button>
              </div>
            </div>

            <div class="d-flex flex-wrap gap-3 mb-3 small">
              <span class="d-inline-flex align-items-center gap-2"><span class="calendar-dot booked"></span>Foglalt nap</span>
              <span class="d-inline-flex align-items-center gap-2"><span class="calendar-dot free"></span>Szabad nap</span>
            </div>

            <div class="calendar-grid" id="calendarGrid"></div>
          </div>
        </div>

        <ul class="nav nav-tabs mb-4" role="tablist">
          <li class="nav-item" role="presentation">
            <button class="nav-link active" id="pending-tab" data-bs-toggle="tab" data-bs-target="#pending" type="button" role="tab">
              Fuggoben <span class="badge text-bg-warning" id="pendingBadge">0</span>
            </button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="nav-link" id="accepted-tab" data-bs-toggle="tab" data-bs-target="#accepted" type="button" role="tab">
              Elfogadva <span class="badge text-bg-success" id="acceptedBadge">0</span>
            </button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="nav-link" id="rejected-tab" data-bs-toggle="tab" data-bs-target="#rejected" type="button" role="tab">
              Elutasitva <span class="badge text-bg-danger" id="rejectedBadge">0</span>
            </button>
          </li>
        </ul>

        <div class="tab-content">
          <div class="tab-pane fade show active" id="pending" role="tabpanel">
            <div id="pendingBookingsContainer" class="row g-3"></div>
          </div>

          <div class="tab-pane fade" id="accepted" role="tabpanel">
            <div id="acceptedBookingsContainer" class="row g-3"></div>
          </div>

          <div class="tab-pane fade" id="rejected" role="tabpanel">
            <div id="rejectedBookingsContainer" class="row g-3"></div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="foglalasaim.js"></script>
</body>
</html>
