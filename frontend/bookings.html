<!doctype html>
<html lang="hu" data-bs-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pályanet - Foglalások</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />

    <style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

:root{
  --accent:#ff7a18;
  --accent-soft:#ff9b3d;
  --accent-darker:#e66a0a;
}

* {
  font-family: 'Inter', sans-serif;
}

@keyframes slideDown {
  from { opacity:0; transform:translateY(-10px); }
  to { opacity:1; transform:translateY(0); }
}

@keyframes fadeIn {
  from { opacity:0; }
  to { opacity:1; }
}

body {
  animation: fadeIn 0.6s ease-out;
}

.navbar {
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(255,122,24,0.1) !important;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.navbar-brand {
  transition: all 0.3s ease;
  font-size: 1.2rem;
  letter-spacing: 0.5px;
}

.navbar-brand:hover {
  color: var(--accent) !important;
  transform: translateY(-2px);
}

.nav-link {
  position: relative;
  font-weight: 500;
  color: inherit !important;
  transition: all 0.3s ease;
  margin: 0 0.5rem;
}

.nav-link::after {
  content: '';
  position: absolute;
  bottom: -8px;
  left: 0;
  width: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent-soft));
  transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

.nav-link:hover::after {
  width: 100%;
}

.nav-link:hover {
  color: var(--accent) !important;
}

[data-bs-theme="dark"] body{
  background:#0b0d12;
  color:#e8e8e8;
}

[data-bs-theme="dark"] .navbar{
  background:#0f1218 !important;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3) !important;
}

[data-bs-theme="light"] body{
  background:#f4f6fa;
}

[data-bs-theme="light"] .navbar{
  background:white !important;
  border-bottom:1px solid rgba(255, 122, 24, 0.15) !important;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08) !important;
}

.booking-card {
  border-radius: 1.5rem;
  overflow: hidden;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
}

.booking-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 15px 40px rgba(255,122,24,0.2) !important;
}

[data-bs-theme="dark"] .booking-card {
  background: radial-gradient(circle at 20% 20%, rgba(255,122,24,.15), transparent 40%), #11151d;
  border: 1px solid rgba(255,255,255,.06);
}

[data-bs-theme="light"] .booking-card {
  background: radial-gradient(circle at 20% 20%, rgba(255,122,24,.1), transparent 40%), white;
  border: 1px solid #e6e6e6;
}

.booking-status {
  display: inline-block;
  padding: 0.4rem 1rem;
  border-radius: 0.8rem;
  font-size: 0.85rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.status-pending {
  background: rgba(255, 193, 7, 0.2);
  color: #ff9800;
}

.status-accepted {
  background: rgba(76, 175, 80, 0.2);
  color: #4caf50;
}

.status-rejected {
  background: rgba(244, 67, 54, 0.2);
  color: #f44336;
}

.renter-info {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: 1rem;
  background: rgba(255,122,24,0.05);
  border-radius: 1rem;
  margin-bottom: 1rem;
}

.renter-avatar {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent-soft) 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 1.5rem;
  flex-shrink: 0;
  overflow: hidden;
}

.renter-avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.action-buttons {
  display: flex;
  gap: 1rem;
  margin-top: 1rem;
}

.action-buttons button {
  flex: 1;
  font-weight: 600;
}

.btn-accept {
  background: linear-gradient(135deg, #4caf50 0%, #45a049 100%);
  border: none;
  color: white;
  transition: all 0.3s ease;
}

.btn-accept:hover {
  background: linear-gradient(135deg, #45a049 0%, #3d8b40 100%);
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(76, 175, 80, 0.3);
  color: white;
}

.btn-reject {
  background: linear-gradient(135deg, #f44336 0%, #da190b 100%);
  border: none;
  color: white;
  transition: all 0.3s ease;
}

.btn-reject:hover {
  background: linear-gradient(135deg, #da190b 0%, #ba0000 100%);
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(244, 67, 54, 0.3);
  color: white;
}

::-webkit-scrollbar {
  width: 10px;
}

::-webkit-scrollbar-track {
  background: rgba(255,122,24,0.05);
}

::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, var(--accent), var(--accent-soft));
  border-radius: 10px;
  transition: background 0.3s ease;
}

::-webkit-scrollbar-thumb:hover {
  background: linear-gradient(180deg, var(--accent-soft), var(--accent));
}

    </style>
  </head>

  <body class="d-flex flex-column min-vh-100" style="background:linear-gradient(135deg, rgba(255,122,24,0.08) 0%, transparent 50%);">
    <header>
      <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
          <a class="navbar-brand fw-bold" href="./index.html">
            <img src="./palyanetlogo.png" alt="Logó" width="30" height="24" class="me-2" />
            Pályanet
          </a>

          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
          </button>

          <div class="collapse navbar-collapse" id="navbarNav">
            <div class="navbar-nav ms-auto align-items-lg-center gap-2">
              <a class="nav-link" href="./palyak.html">Pályák</a>
              <a class="nav-link active" href="./bookings.html">📋 Foglalások</a>
              <a class="nav-link" href="./contact.html">Kapcsolat</a>
              <a class="nav-link" href="./user_profile.html">👤 Profil</a>

              <div class="nav-item ms-lg-2">
                <button id="themeToggle" class="btn btn-outline-secondary btn-sm" type="button" aria-label="Téma váltása">🌙 Dark</button>
              </div>
            </div>
          </div>
        </div>
      </nav>
    </header>

    <main class="container py-5 flex-fill">
      <div class="row mb-4">
        <div class="col">
          <h1 class="h2 fw-bold">Foglalások kezelése</h1>
          <p class="text-muted">Tekintsd meg és kezelj foglalási kérelmeket</p>
        </div>
      </div>

      <ul class="nav nav-tabs mb-4" role="tablist">
        <li class="nav-item" role="presentation">
          <button class="nav-link active" id="pending-tab" data-bs-toggle="tab" data-bs-target="#pending" type="button" role="tab">
            ⏳ Függőben <span class="badge bg-warning" id="pendingBadge">0</span>
          </button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link" id="accepted-tab" data-bs-toggle="tab" data-bs-target="#accepted" type="button" role="tab">
            ✅ Elfogadva <span class="badge bg-success" id="acceptedBadge">0</span>
          </button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link" id="rejected-tab" data-bs-toggle="tab" data-bs-target="#rejected" type="button" role="tab">
            ❌ Elutasítva <span class="badge bg-danger" id="rejectedBadge">0</span>
          </button>
        </li>
      </ul>

      <div class="tab-content">
        <div class="tab-pane fade show active" id="pending" role="tabpanel">
          <div id="pendingBookingsContainer" class="row g-3">
            <div class="col-12"><p class="text-center text-muted">Nincsenek függőben lévő foglalások</p></div>
          </div>
        </div>

        <div class="tab-pane fade" id="accepted" role="tabpanel">
          <div id="acceptedBookingsContainer" class="row g-3">
            <div class="col-12"><p class="text-center text-muted">Nincsenek elfogadott foglalások</p></div>
          </div>
        </div>

        <div class="tab-pane fade" id="rejected" role="tabpanel">
          <div id="rejectedBookingsContainer" class="row g-3">
            <div class="col-12"><p class="text-center text-muted">Nincsenek elutasított foglalások</p></div>
          </div>
        </div>
      </div>
    </main>

    <footer class="text-center py-4 mt-5 border-top">
      <div class="container">© 2026 Pályanet - Minden jog fenntartva</div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./auth-nav.js"></script>
    <script>
      (function () {
        const user = JSON.parse(localStorage.getItem("user") || sessionStorage.getItem("user") || "null");
        if (!user) {
          window.location.replace("./login.html");
          return;
        }
        if (user.szerep === "palyatulajdonos") {
          window.location.replace("./profile/foglalasaim.html");
          return;
        }
        if (user.szerep === "berlo") {
          window.location.replace("./profile/berleseim.html");
        }
      })();
    </script>

    <script>
      // Theme toggle
      const htmlEl = document.documentElement;
      const btn = document.getElementById("themeToggle");

      function setTheme(theme) {
        htmlEl.setAttribute("data-bs-theme", theme);
        localStorage.setItem("theme", theme);

        if (theme === "dark") {
          btn.textContent = "☀️ Light";
          btn.classList.remove("btn-outline-secondary");
          btn.classList.add("btn-outline-light");
        } else {
          btn.textContent = "🌙 Dark";
          btn.classList.remove("btn-outline-light");
          btn.classList.add("btn-outline-secondary");
        }
      }

      const saved = localStorage.getItem("theme");
      const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
      setTheme(saved ?? (prefersDark ? "dark" : "light"));

      btn.addEventListener("click", () => {
        const current = htmlEl.getAttribute("data-bs-theme") || "light";
        setTheme(current === "dark" ? "light" : "dark");
      });

      // Load bookings
      async function loadBookings() {
        const user = JSON.parse(localStorage.getItem("user") || sessionStorage.getItem("user"));

        if (!user) {
          window.location.href = "./login.html";
          return;
        }

        // Only owners can access this page
        if (user.szerep !== "palyatulajdonos") {
          alert("Csak pályatulajdonosok férhetnek hozzá erre az oldalra!");
          window.location.href = "./palyak.html";
          return;
        }

        try {
          const response = await fetch(`http://localhost:4000/api/bookings/owner/${user.felhasznalo_id}`);
          const bookings = await response.json();

          // Separate bookings by status
          const pending = bookings.filter(b => b.statusz === "pending");
          const accepted = bookings.filter(b => b.statusz === "accepted");
          const rejected = bookings.filter(b => b.statusz === "rejected");

          document.getElementById("pendingBadge").textContent = pending.length;
          document.getElementById("acceptedBadge").textContent = accepted.length;
          document.getElementById("rejectedBadge").textContent = rejected.length;

          displayBookings("pendingBookingsContainer", pending, true);
          displayBookings("acceptedBookingsContainer", accepted, false);
          displayBookings("rejectedBookingsContainer", rejected, false);
        } catch (error) {
          console.error("Hiba a foglalások betöltésénél:", error);
        }
      }

      function displayBookings(containerId, bookings, showActions) {
        const container = document.getElementById(containerId);

        if (bookings.length === 0) {
          container.innerHTML = '<div class="col-12"><p class="text-center text-muted">Nincsenek foglalások</p></div>';
          return;
        }

        container.innerHTML = bookings
          .map(
            (booking) => `
          <div class="col-md-6 col-lg-4">
            <div class="card booking-card bg-body-tertiary shadow-sm">
              <div class="card-body">
                <h5 class="card-title fw-bold">${booking.palya_nev}</h5>
                <p class="text-muted mb-2">${booking.sportag} • ${booking.helyszin}</p>

                <div class="renter-info">
                  <div class="renter-avatar">
                    ${booking.profil_kep_url ? `<img src="${booking.profil_kep_url.startsWith('http') ? booking.profil_kep_url : 'http://localhost:4000' + booking.profil_kep_url}" alt="${booking.teljes_nev}" />` : '👤'}
                  </div>
                  <div>
                    <p class="mb-0 fw-semibold">${booking.teljes_nev}</p>
                    <p class="mb-0 text-muted small">@${booking.username}</p>
                  </div>
                </div>

                <div class="mb-3">
                  <p class="mb-1"><strong>Dátum:</strong> <br> ${new Date(booking.kezdes).toLocaleDateString('hu-HU')} ${new Date(booking.kezdes).toLocaleTimeString('hu-HU', { hour: '2-digit', minute: '2-digit', hour12: false })} - ${new Date(booking.vege).toLocaleTimeString('hu-HU', { hour: '2-digit', minute: '2-digit', hour12: false })}</p>
                  <p class="mb-1"><strong>Ár:</strong> ${booking.ar} Ft</p>
                  <p class="mb-0">
                    <span class="booking-status status-${booking.statusz}">${booking.statusz === 'pending' ? '⏳ Függőben' : booking.statusz === 'accepted' ? '✅ Elfogadva' : '❌ Elutasítva'}</span>
                  </p>
                </div>

                ${showActions ? `
                <div class="action-buttons">
                  <button class="btn btn-accept" onclick="acceptBooking(${booking.foglalas_id})">
                    ✅ Elfogadás
                  </button>
                  <button class="btn btn-reject" onclick="rejectBooking(${booking.foglalas_id})">
                    ❌ Elutasítás
                  </button>
                </div>
                ` : ''}
              </div>
            </div>
          </div>
        `
          )
          .join("");
      }

      async function acceptBooking(foglalas_id) {
        if (!confirm("Biztosan elfogadod ezt a foglalást?")) {
          return;
        }

        try {
          const response = await fetch("http://localhost:4000/api/bookings/accept", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              foglalas_id: foglalas_id,
            }),
          });

          if (response.ok) {
            alert("Foglalás elfogadva!");
            loadBookings();
          } else {
            alert("Hiba az elfogadásnál");
          }
        } catch (error) {
          console.error("Hiba:", error);
        }
      }

      async function rejectBooking(foglalas_id) {
        if (!confirm("Biztosan elutasítod ezt a foglalást?")) {
          return;
        }

        try {
          const response = await fetch("http://localhost:4000/api/bookings/reject", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              foglalas_id: foglalas_id,
            }),
          });

          if (response.ok) {
            alert("Foglalás elutasítva!");
            loadBookings();
          } else {
            alert("Hiba az elutasításnál");
          }
        } catch (error) {
          console.error("Hiba:", error);
        }
      }

      // Load bookings on page load
      loadBookings();
    </script>
  </body>
</html>
